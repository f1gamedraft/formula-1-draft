<!DOCTYPE html>
<html lang="it">
<head>

    <title>F1 24-0 Challenge</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #15151e;
            color: #ffffff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #e10600; /* Rosso F1 */ }
        .game-container {
            max-width: 600px;
            margin: 0 auto;
            background: #1e1e2c;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        #spinner {
            font-size: 1.2em;
            margin: 20px 0;
            padding: 15px;
            background: #2a2a3c;
            border-radius: 8px;
            border: 2px dashed #ffeb3b;
            min-height: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .stats-preview {
            color: #ffeb3b;
            font-size: 0.85em;
            margin-top: 10px;
        }
        button {
            background-color: #e10600;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #ff1e15; }
        button:disabled { background-color: #555; cursor: not-allowed; }
        
        .slot {
            background: #2a2a3c;
            border: 2px solid #444;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: border-color 0.2s;
        }
        .slot:hover { border-color: #e10600; }
        .slot.filled {
            background: #e10600;
            border-color: #e10600;
            cursor: not-allowed;
            pointer-events: none;
        }
        .slot-name { font-weight: bold; }
        .slot-value { font-style: italic; color: #ccc; }
        .slot.filled .slot-value { color: #fff; font-style: normal; font-weight: bold; }
        
        #result { margin-top: 20px; font-size: 1.5em; font-weight: bold; }
    </style>
</head>
