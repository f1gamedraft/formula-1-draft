<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 24-0 Challenge</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #15151e;
            color: #ffffff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #e10600; /* Rosso F1 */ }
        .game-container {
            max-width: 600px;
            margin: 0 auto;
            background: #1e1e2c;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        #spinner {
            font-size: 1.5em;
            margin: 20px 0;
            padding: 15px;
            background: #2a2a3c;
            border-radius: 8px;
            border: 2px dashed #ffeb3b;
        }
        button {
            background-color: #e10600;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #ff1e15; }
        button:disabled { background-color: #555; cursor: not-allowed; }
        
        .slot {
            background: #2a2a3c;
            border: 2px solid #444;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: border-color 0.2s;
        }
        .slot:hover { border-color: #e10600; }
        .slot.filled {
            background: #e10600;
            border-color: #e10600;
            cursor: not-allowed;
            pointer-events: none;
        }
        .slot-name { font-weight: bold; }
        .slot-value { font-style: italic; color: #ccc; }
        .slot.filled .slot-value { color: #fff; font-style: normal; font-weight: bold; }
        
        #result { margin-top: 20px; font-size: 1.5em; color: #4caf50; }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>F1 24-0 Challenge</h1>
        <p>Pesca una scuderia e costruisci il team perfetto. Riuscirai a vincere tutte le 24 gare?</p>
        
        <div id="spinner">Premi "Pesca" per iniziare!</div>
        <button id="spinBtn" onclick="spin()">Pesca Scuderia</button>

        <div id="slots">
            <div class="slot" id="slot-0" onclick="selectSlot(0)">
                <span class="slot-name">Pilota 1</span> <span class="slot-value">Vuoto</span>
            </div>
            <div class="slot" id="slot-1" onclick="selectSlot(1)">
                <span class="slot-name">Pilota 2</span> <span class="slot-value">Vuoto</span>
            </div>
            <div class="slot" id="slot-2" onclick="selectSlot(2)">
                <span class="slot-name">Team Principal / Strategia</span> <span class="slot-value">Vuoto</span>
            </div>
            <div class="slot" id="slot-3" onclick="selectSlot(3)">
                <span class="slot-name">Aerodinamica (Telaio)</span> <span class="slot-value">Vuoto</span>
            </div>
            <div class="slot" id="slot-4" onclick="selectSlot(4)">
                <span class="slot-name">Motore e Affidabilità</span> <span class="slot-value">Vuoto</span>
            </div>
        </div>

        <div id="result"></div>
    </div>

    <script>
        // Il tuo "Database" iniziale (puoi aggiungere quante auto vuoi!)
        const teams = [
            { name: "Ferrari 2004", rating: 99 },
            { name: "Mercedes 2020", rating: 98 },
            { name: "Red Bull 2023", rating: 98 },
            { name: "McLaren 1988", rating: 97 },
            { name: "Williams 1992", rating: 95 },
            { name: "Brawn GP 2009", rating: 90 },
            { name: "Ferrari 2020", rating: 65 },
            { name: "McLaren 2015", rating: 50 }, // Disastro motore Honda
            { name: "Minardi 2001", rating: 40 },
            { name: "Haas 2021", rating: 35 }
        ];

        let currentTeam = null;
        let filledSlots = 0;
        let totalScore = 0;

        function spin() {
            if (currentTeam) {
                alert("Assegna la scuderia pescata prima di pescare di nuovo!");
                return;
            }
            
            const btn = document.getElementById("spinBtn");
            btn.disabled = true;

            // Effetto finto caricamento (suspense)
            let counter = 0;
            const interval = setInterval(() => {
                const randomVisual = teams[Math.floor(Math.random() * teams.length)].name;
                document.getElementById("spinner").innerText = randomVisual;
                counter++;
                if (counter > 10) {
                    clearInterval(interval);
                    // Pescata finale vera
                    currentTeam = teams[Math.floor(Math.random() * teams.length)];
                    document.getElementById("spinner").innerHTML = `Hai pescato:<br><strong>${currentTeam.name}</strong><br><small>Scegli dove posizionarla!</small>`;
                    btn.disabled = false;
                }
            }, 100);
        }

        function selectSlot(index) {
            if (!currentTeam) {
                alert("Devi prima pescare una scuderia!");
                return;
            }
            
            const slot = document.getElementById(`slot-${index}`);
            
            // Aggiorna la grafica dello slot
            slot.querySelector(".slot-value").innerText = currentTeam.name;
            slot.classList.add("filled");
            
            // Aggiungi al punteggio
            totalScore += currentTeam.rating;
            filledSlots++;
            currentTeam = null;
            
            document.getElementById("spinner").innerText = "Premi 'Pesca' per la prossima estrazione!";

            // Fine del gioco
            if (filledSlots === 5) {
                document.getElementById("spinner").style.display = "none";
                document.getElementById("spinBtn").style.display = "none";
                calcolaRisultato();
            }
        }

        function calcolaRisultato() {
            const media = totalScore / 5;
            let message = "";
            let color = "";

            if (media >= 92) {
                message = `Valutazione: ${media.toFixed(1)}. INCREDIBILE! 24-0 Perfetto! 🏆`;
                color = "#ffd700"; // Oro
            } else if (media >= 80) {
                message = `Valutazione: ${media.toFixed(1)}. Ottima stagione, vinci il mondiale ma non tutte le gare. 🏁`;
                color = "#4caf50"; // Verde
            } else if (media >= 60) {
                message = `Valutazione: ${media.toFixed(1)}. Stagione a metà classifica. Lotti per i punti. 😐`;
                color = "#ff9800"; // Arancione
            } else {
                message = `Valutazione: ${media.toFixed(1)}. Un disastro totale. Siete gli zimbelli del paddock. 🚜`;
                color = "#f44336"; // Rosso
            }

            const resultDiv = document.getElementById("result");
            resultDiv.innerText = message;
            resultDiv.style.color = color;
        }
    </script>
</body>
</html>
